<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4FACFE" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A18CD1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="375" height="812" fill="url(#space)"/>
  <!-- Stars background -->
  <circle cx="45" cy="120" r="1" fill="white" opacity="0.3"/>
  <circle cx="130" cy="80" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="280" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="320" cy="90" r="1" fill="white" opacity="0.25"/>
  <circle cx="90" cy="200" r="1.5" fill="white" opacity="0.15"/>
  <circle cx="350" cy="250" r="1" fill="white" opacity="0.3"/>
  <circle cx="20" cy="350" r="1" fill="white" opacity="0.2"/>
  <circle cx="160" cy="400" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="310" cy="450" r="1" fill="white" opacity="0.25"/>
  <circle cx="70" cy="500" r="1" fill="white" opacity="0.3"/>
  <circle cx="250" cy="550" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="340" cy="600" r="1" fill="white" opacity="0.35"/>
  <circle cx="100" cy="650" r="1" fill="white" opacity="0.2"/>
  <circle cx="200" cy="700" r="1.5" fill="white" opacity="0.3"/>
  <!-- Connection lines -->
  <path d="M120,280 Q200,200 260,320" stroke="url(#line1)" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M260,320 Q300,400 200,450" stroke="url(#line2)" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M200,450 Q150,500 100,420" stroke="url(#line1)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M100,420 Q60,350 120,280" stroke="url(#line2)" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M260,320 Q320,350 300,250" stroke="url(#line1)" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Memory nodes -->
  <g filter="url(#glowBig)">
    <circle cx="120" cy="280" r="18" fill="#FF6B9D" opacity="0.8"/>
    <circle cx="120" cy="280" r="12" fill="#FF6B9D"/>
    <text x="120" y="285" font-family="system-ui" font-size="10" fill="white" text-anchor="middle" font-weight="600">日出</text>
  </g>
  <g filter="url(#glowBig)">
    <circle cx="260" cy="320" r="22" fill="#4FACFE" opacity="0.8"/>
    <circle cx="260" cy="320" r="15" fill="#4FACFE"/>
    <text x="260" y="325" font-family="system-ui" font-size="10" fill="white" text-anchor="middle" font-weight="600">生日</text>
  </g>
  <g filter="url(#glowBig)">
    <circle cx="200" cy="450" r="16" fill="#A18CD1" opacity="0.8"/>
    <circle cx="200" cy="450" r="10" fill="#A18CD1"/>
    <text x="200" y="455" font-family="system-ui" font-size="9" fill="white" text-anchor="middle" font-weight="600">咖啡</text>
  </g>
  <g filter="url(#glowBig)">
    <circle cx="100" cy="420" r="14" fill="#00F2FE" opacity="0.8"/>
    <circle cx="100" cy="420" r="9" fill="#00F2FE"/>
    <text x="100" y="425" font-family="system-ui" font-size="9" fill="white" text-anchor="middle" font-weight="600">旅行</text>
  </g>
  <g filter="url(#glow)">
    <circle cx="300" cy="250" r="10" fill="#FF8E53" opacity="0.7"/>
    <circle cx="300" cy="250" r="6" fill="#FF8E53"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="160" cy="550" r="12" fill="#FBC2EB" opacity="0.7"/>
    <circle cx="160" cy="550" r="7" fill="#FBC2EB"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="280" cy="500" r="8" fill="#00F2FE" opacity="0.6"/>
    <circle cx="280" cy="500" r="5" fill="#00F2FE"/>
  </g>
  <!-- Header -->
  <rect x="0" y="0" width="375" height="80" fill="rgba(10,10,26,0.8)"/>
  <text x="24" y="56" font-family="system-ui" font-size="22" font-weight="700" fill="white">记忆星图</text>
  <text x="24" y="72" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.5)">7 个记忆节点</text>
  <!-- Bottom nav -->
  <rect x="0" y="760" width="375" height="52" fill="rgba(10,10,26,0.9)"/>
  <line x1="0" y1="760" x2="375" y2="760" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <text x="72" y="790" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">回忆</text>
  <text x="188" y="790" font-family="system-ui" font-size="11" fill="#4FACFE" text-anchor="middle">星图</text>
  <circle cx="188" cy="776" r="3" fill="#4FACFE"/>
  <text x="303" y="790" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">设置</text>
</svg>
