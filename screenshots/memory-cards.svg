<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F5F7"/>
      <stop offset="100%" stop-color="#E8E9ED"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FF8E53"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A18CD1"/>
      <stop offset="100%" stop-color="#FBC2EB"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="url(#bg)"/>
  <rect x="8" y="8" width="359" height="796" rx="36" fill="none" stroke="#D1D3D8" stroke-width="1.5"/>
  <!-- Status bar -->
  <text x="30" y="52" font-family="system-ui" font-size="14" font-weight="600" fill="#111318">9:41</text>
  <!-- Header -->
  <rect x="0" y="70" width="375" height="80" fill="rgba(244,245,247,0.95)"/>
  <text x="24" y="108" font-family="system-ui" font-size="22" font-weight="700" fill="#111318">甜蜜回忆</text>
  <text x="24" y="130" font-family="system-ui" font-size="13" fill="#8E8E93">共 24 条记忆</text>
  <!-- Search bar -->
  <rect x="24" y="160" width="327" height="40" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="48" y="185" font-family="system-ui" font-size="14" fill="#C7C7CC">搜索记忆...</text>
  <!-- Memory cards -->
  <g filter="url(#shadow)">
    <rect x="24" y="216" width="327" height="120" rx="16" fill="white"/>
    <rect x="24" y="216" width="4" height="120" rx="2" fill="url(#card1)"/>
    <text x="44" y="244" font-family="system-ui" font-size="16" font-weight="600" fill="#111318">第一次看日出</text>
    <text x="44" y="266" font-family="system-ui" font-size="13" fill="#8E8E93">2024-08-15 06:30</text>
    <text x="44" y="296" font-family="system-ui" font-size="13" fill="#636366">清晨五点半起床，和你一起爬到山顶...</text>
    <rect x="44" y="308" width="48" height="20" rx="10" fill="#FFF0F3"/>
    <text x="58" y="322" font-family="system-ui" font-size="11" fill="#FF6B9D">浪漫</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="24" y="352" width="327" height="120" rx="16" fill="white"/>
    <rect x="24" y="352" width="4" height="120" rx="2" fill="url(#card2)"/>
    <text x="44" y="380" font-family="system-ui" font-size="16" font-weight="600" fill="#111318">生日惊喜</text>
    <text x="44" y="402" font-family="system-ui" font-size="13" fill="#8E8E93">2024-06-22 19:45</text>
    <text x="44" y="432" font-family="system-ui" font-size="13" fill="#636366">推开门的那一刻，满屋子的气球和...</text>
    <rect x="44" y="444" width="48" height="20" rx="10" fill="#F0F8FF"/>
    <text x="58" y="458" font-family="system-ui" font-size="11" fill="#4FACFE">惊喜</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="24" y="488" width="327" height="120" rx="16" fill="white"/>
    <rect x="24" y="488" width="4" height="120" rx="2" fill="url(#card3)"/>
    <text x="44" y="516" font-family="system-ui" font-size="16" font-weight="600" fill="#111318">雨天的咖啡馆</text>
    <text x="44" y="538" font-family="system-ui" font-size="13" fill="#8E8E93">2024-09-03 14:20</text>
    <text x="44" y="568" font-family="system-ui" font-size="13" fill="#636366">窗外下着大雨，我们在咖啡馆里聊了...</text>
    <rect x="44" y="580" width="48" height="20" rx="10" fill="#F5F0FF"/>
    <text x="58" y="594" font-family="system-ui" font-size="11" fill="#A18CD1">温暖</text>
  </g>
  <!-- Floating action button -->
  <circle cx="327" cy="720" r="28" fill="url(#card1)" filter="url(#shadow)"/>
  <text x="319" y="726" font-family="system-ui" font-size="24" fill="white" text-anchor="middle">+</text>
  <!-- Bottom nav -->
  <rect x="0" y="760" width="375" height="52" fill="white"/>
  <line x1="0" y1="760" x2="375" y2="760" stroke="#E5E5EA" stroke-width="0.5"/>
  <text x="72" y="790" font-family="system-ui" font-size="11" fill="#FF6B9D" text-anchor="middle">回忆</text>
  <circle cx="72" cy="776" r="3" fill="#FF6B9D"/>
  <text x="188" y="790" font-family="system-ui" font-size="11" fill="#8E8E93" text-anchor="middle">星图</text>
  <text x="303" y="790" font-family="system-ui" font-size="11" fill="#8E8E93" text-anchor="middle">设置</text>
</svg>
