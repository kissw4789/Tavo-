<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#F8F9FB" rx="12"/>
  <text x="400" y="40" font-family="system-ui" font-size="20" font-weight="700" fill="#111318" text-anchor="middle">Tavo Memo 架构</text>
  <!-- Launch layer -->
  <rect x="300" y="60" width="200" height="60" rx="12" fill="url(#g1)" filter="url(#shadow2)"/>
  <text x="400" y="88" font-family="system-ui" font-size="14" font-weight="600" fill="white" text-anchor="middle">启动入口</text>
  <text x="400" y="106" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">tavo1_启动</text>
  <!-- Arrow -->
  <line x1="400" y1="120" x2="400" y2="160" stroke="#C7C7CC" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#C7C7CC"/></marker></defs>
  <!-- Three modules -->
  <rect x="60" y="170" width="200" height="100" rx="12" fill="url(#g2)" filter="url(#shadow2)"/>
  <text x="160" y="200" font-family="system-ui" font-size="14" font-weight="600" fill="white" text-anchor="middle">BaseCore 核心引擎</text>
  <text x="160" y="220" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">v3.3.0-refactored</text>
  <text x="160" y="250" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">数据存储 / DOM / 事件 / UI框架</text>

  <rect x="300" y="170" width="200" height="100" rx="12" fill="url(#g3)" filter="url(#shadow2)"/>
  <text x="400" y="200" font-family="system-ui" font-size="14" font-weight="600" fill="white" text-anchor="middle">LightPages 轻量页面</text>
  <text x="400" y="220" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">v3.3.0-lightpages</text>
  <text x="400" y="250" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">记忆卡片 / 甜蜜回忆 / 动画</text>

  <rect x="540" y="170" width="200" height="100" rx="12" fill="url(#g4)" filter="url(#shadow2)"/>
  <text x="640" y="200" font-family="system-ui" font-size="14" font-weight="600" fill="white" text-anchor="middle">MemoryStarmap 星图</text>
  <text x="640" y="220" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">v3.3.0-memory</text>
  <text x="640" y="250" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">星图可视化 / 节点连线</text>

  <!-- Arrows from launcher to modules -->
  <line x1="340" y1="120" x2="160" y2="168" stroke="#C7C7CC" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="120" x2="400" y2="168" stroke="#C7C7CC" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="460" y1="120" x2="640" y2="168" stroke="#C7C7CC" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Bottom: Storage layer -->
  <rect x="200" y="320" width="400" height="60" rx="12" fill="#E8E9ED" filter="url(#shadow2)"/>
  <text x="400" y="348" font-family="system-ui" font-size="14" font-weight="600" fill="#636366" text-anchor="middle">localStorage 本地持久化</text>
  <text x="400" y="366" font-family="system-ui" font-size="11" fill="#8E8E93" text-anchor="middle">tavo_preview_memory_state_v3</text>

  <!-- Arrows to storage -->
  <line x1="160" y1="270" x2="300" y2="318" stroke="#C7C7CC" stroke-width="1.5"/>
  <line x1="400" y1="270" x2="400" y2="318" stroke="#C7C7CC" stroke-width="1.5"/>
  <line x1="640" y1="270" x2="500" y2="318" stroke="#C7C7CC" stroke-width="1.5"/>

  <!-- Bottom: Tavo host -->
  <rect x="250" y="420" width="300" height="50" rx="12" fill="#111318" filter="url(#shadow2)"/>
  <text x="400" y="450" font-family="system-ui" font-size="14" font-weight="600" fill="white" text-anchor="middle">Tavo 宿主应用</text>
  <line x1="400" y1="380" x2="400" y2="418" stroke="#C7C7CC" stroke-width="1.5"/>
</svg>
